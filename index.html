<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeweyOS Portfolio</title>

  <link rel="stylesheet" href="style.css" />

  <!-- FONT AWESOME 5 (used for icons where no custom images exist) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body class="wallpaper-1">

<!-- ================= BOOT SCREEN ================= -->
<div id="bootScreen" class="boot-screen">
  <div class="boot-logo">DeweyOS</div>
  <div class="boot-sub">Starting portfolio system...</div>
</div>

<!-- ================= LOGIN ================= -->
<div id="loginScreen" class="login-screen hidden">
  <div class="login-card glass">
    <img src="Imgs/profile.png" class="login-avatar">
    <h1>Dewey</h1>
    <button id="signInBtn">Sign In</button>
  </div>
</div>

<!-- ================= DESKTOP ================= -->
<main id="desktop" class="desktop hidden">

  <!-- DESKTOP ICONS -->
  <div class="desktop-icons">

    <!-- CUSTOM ICON -->
    <button class="desktop-shortcut" data-window="chromeWindow">
      <img src="Imgs/browser.png">
      <span>Chrome</span>
    </button>

    <!-- CUSTOM ICON -->
    <button class="desktop-shortcut" data-window="projectsWindow">
      <img src="Imgs/folder.png">
      <span>Projects</span>
    </button>

    <!-- CUSTOM ICON -->
    <button class="desktop-shortcut" data-window="musicWindow">
      <img src="Imgs/iheart.png">
      <span>Music</span>
    </button>

    <!-- CHANGE ICON HERE -->
    <button class="desktop-shortcut" data-window="recycleWindow">
      <i class="fas fa-trash"></i>
      <span>Recycle Bin</span>
    </button>

    <!-- CHANGE ICON HERE -->
    <button class="desktop-shortcut" data-window="settingsWindow">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </button>

    <!-- CHANGE ICON HERE -->
    <button class="desktop-shortcut" data-window="serverWindow">
      <i class="fas fa-server"></i>
      <span>Server</span>
    </button>

    <!-- CHANGE ICON HERE -->
    <button class="desktop-shortcut" data-window="storeWindow">
      <i class="fas fa-store"></i>
      <span>Store</span>
    </button>

    <!-- CHANGE ICON HERE -->
    <button class="desktop-shortcut" data-window="systemWindow">
      <i class="fas fa-desktop"></i>
      <span>This PC</span>
    </button>

  </div>

  <!-- ================= PROJECT WINDOW ================= -->
  <section class="window glass hidden-window" id="projectsWindow">

    <div class="window-bar">
      <span>Projects</span>
    </div>

    <div class="window-content">

      <div class="project-folder-card">
        <!-- CHANGE ICON HERE -->
        <i class="fas fa-folder"></i>
        <h3>DeweyOS</h3>
      </div>

      <div class="project-folder-card">
        <i class="fas fa-folder"></i>
        <h3>Deweys Media</h3>
      </div>

    </div>
  </section>

  <!-- ================= CHROME WINDOW ================= -->
  <section class="window glass hidden-window" id="chromeWindow">

    <div class="window-bar">Chrome</div>

    <div class="chrome-toolbar">

      <!-- NAV ICONS -->
      <!-- CHANGE ICONS HERE -->
      <button><i class="fas fa-arrow-left"></i></button>
      <button><i class="fas fa-arrow-right"></i></button>
      <button><i class="fas fa-redo"></i></button>

      <input type="text" value="home://welcome">

      <button>Go</button>

    </div>

    <div class="window-content">
      <iframe src="about:blank"></iframe>
    </div>

  </section>

  <!-- ================= TERMINAL ================= -->
  <section class="window glass hidden-window" id="terminalWindow">
    <div class="window-bar">Terminal</div>
    <div class="window-content" id="terminalOutput"></div>
  </section>

  <!-- ================= SETTINGS ================= -->
  <section class="window glass hidden-window" id="settingsWindow">
    <div class="window-bar">Settings</div>
    <div class="window-content">
      <h3>Wallpaper</h3>
    </div>
  </section>

  <!-- ================= TASKBAR ================= -->
  <footer class="taskbar">

    <div class="taskbar-left">

      <!-- START BUTTON -->
      <button id="startBtn">
        <img src="Imgs/start.png">
        <span>Start</span>
      </button>

      <!-- TASK ICONS -->
      <button data-window="chromeWindow">
        <img src="Imgs/browser.png">
      </button>

      <button data-window="projectsWindow">
        <img src="Imgs/folder.png">
      </button>

      <button data-window="musicWindow">
        <img src="Imgs/iheart.png">
      </button>

      <!-- CHANGE ICON -->
      <button data-window="settingsWindow">
        <i class="fas fa-cog"></i>
      </button>

    </div>

    <div class="taskbar-right">

      <!-- SYSTEM ICONS -->
      <!-- CHANGE ICONS HERE -->
      <i class="fas fa-bell"></i>
      <i class="fas fa-wifi"></i>
      <i class="fas fa-battery-full"></i>

      <span id="clockBottom">12:00</span>

    </div>

  </footer>

</main>

<script src="script.js"></script>

</body>
</html>
